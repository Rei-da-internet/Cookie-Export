<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <div class="header-inner">
        <div class="brand">

  <button type="button" id="backTop" class="back-top" aria-label="Voltar ao topo">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 4l7 7-1.4 1.4L13 8.8V20h-2V8.8l-4.6 3.6L5 11l7-7Z"/>
